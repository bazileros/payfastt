name: Deploy docs
on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "packages/**"

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs
        run: bunx turbo build --filter=docs

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config apps/docs/dist/server/wrangler.json

      - name: Notify success
        run: echo "Docs deployed to https://payfastt.dev/docs"

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Docs deploy failed."
