name: Deploy web app
on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        run: bunx turbo build --filter=web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy apps/web/dist --project-name=payfastt-web

      - name: Notify success
        run: echo "Web deployed to https://payfastt.dev"

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Web deploy failed. Check Cloudflare dashboard for details."
