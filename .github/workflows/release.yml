name: Release
on:
  push:
    branches: [main]
    paths: ["packages/payfast/**"]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  id-token: write
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump version and tag
        working-directory: packages/payfast
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BUMP="${{ inputs.bump || 'patch' }}"
          NEW_VERSION=$(bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const [maj, min, pat] = pkg.version.split('.').map(Number);
            if ('$BUMP' === 'major') pkg.version = \`\${maj+1}.0.0\`;
            else if ('$BUMP' === 'minor') pkg.version = \`\${maj}.\${min+1}.0\`;
            else pkg.version = \`\${maj}.\${min}.\${pat+1}\`;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
            console.log(pkg.version);
          ")
          echo "Bumped to v$NEW_VERSION"
          git add package.json
          git commit -m "chore(release): v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin HEAD --tags

      - name: Build
        run: bun run build --filter=@bazileros/payfast

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm with provenance
        working-directory: packages/payfast
        run: npm publish --provenance --access public

      - name: Notify failure
        if: failure()
        run: echo "::error::Release failed"
